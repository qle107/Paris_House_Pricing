name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Lint
        run: ruff check rei
      - name: Tests (file mode, no DB)
        env:
          REI_STORAGE: files
        run: pytest -q
